services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    environment:
      LEROBOT_DATASET_PATH: ${LEROBOT_DATASET_PATH:-/data/dataset}
      LEROBOT_REPO_ID: ${LEROBOT_REPO_ID:-}
      LEROBOT_PRELOAD_FRAMES: ${LEROBOT_PRELOAD_FRAMES:-12}
      LEROBOT_FRAME_CACHE_SIZE: ${LEROBOT_FRAME_CACHE_SIZE:-512}
    volumes:
      - ../backend:/app:ro
      - ${LEROBOT_DATASET_PATH:-./dataset}:/data/dataset:ro
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app:ro
      - frontend_dist:/dist
    command: sh -c "npm install && npm run build && cp -r dist/* /dist/"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  frontend_dist:
