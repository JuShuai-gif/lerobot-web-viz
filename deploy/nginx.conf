server {
    listen 80;
    server_name _;

    client_max_body_size 2g;
    keepalive_timeout 75s;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types application/json image/jpeg image/webp;

    root /usr/share/nginx/html;
    index index.html;

    location /api/episodes/ {
        # Route video file requests directly from disk for maximum throughput
        location ~ ^/api/episodes/[0-9]+/videos/file/(.+)$ {
            alias /datasets/;
            try_files /$1 =404;
            add_header Cache-Control "public, max-age=3600";
        }
        # Other episode API requests go to backend
        proxy_pass http://backend:8000/api/episodes/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
